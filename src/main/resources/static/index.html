<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nivesh AI — AI-Powered Stock Portfolio Management for Smart Investors">
    <meta name="theme-color" content="#050507">
    <title>Nivesh AI — Smart Portfolio Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>
    <!-- AUTH PAGE -->
    <div id="auth-page" class="page-container"></div>

    <!-- MAIN APP -->
    <div id="app" class="app-layout" style="display:none;">
        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <rect width="28" height="28" rx="7" fill="url(#logoGrad)"/>
                            <path d="M7 20L11 12L15 16L21 8" stroke="#050507" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="21" cy="8" r="2" fill="#050507"/>
                            <defs>
                                <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
                                    <stop offset="0%" stop-color="#FFE066"/>
                                    <stop offset="100%" stop-color="#C49B0D"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <span class="logo-text">NIVESH<span class="logo-accent">AI</span></span>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
            </div>

            <div class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-page="dashboard" id="nav-dashboard">
                    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="#recommendations" class="nav-item" data-page="recommendations" id="nav-recommendations">
                    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
                    <span>Signals</span>
                </a>
                <a href="#portfolio" class="nav-item" data-page="portfolio" id="nav-portfolio">
                    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 000 4h4v-4h-4z"/></svg>
                    <span>Portfolio</span>
                </a>
                <a href="#profile" class="nav-item" data-page="profile" id="nav-profile">
                    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0113 0"/></svg>
                    <span>Profile</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="user-info" id="user-info">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <div class="user-details">
                        <span class="user-name" id="user-name">User</span>
                        <span class="user-email" id="user-email">user@email.com</span>
                    </div>
                </div>
                <button id="logout-btn" class="btn-logout" title="Sign Out">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div id="page-content" class="page-content"></div>
        </main>
    </div>

    <!-- Toast -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/recommendations.js"></script>
    <script src="/js/portfolio.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/router.js"></script>
</body>
</html>
