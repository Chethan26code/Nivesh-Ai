# Application
spring.application.name=niveshai
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/niveshai
spring.datasource.username=postgres
spring.datasource.password=resh
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=NiveshAI2024SecretKeyForJWTTokenGenerationMustBeLongEnoughForHS512Algorithm!!
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.niveshai=INFO
logging.level.org.springframework.security=WARN
